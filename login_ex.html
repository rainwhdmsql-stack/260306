<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login_ex</title>
    <link rel="stylesheet" href="css/login_ex.css">
</head>
<body>
    <div class="login_box">
        <div class="login_btn">
            <p class="logo">
                <img src="images/logo_hamster.png" alt="햄스터 로고">
            </p>
            <p class="loto_text">
                Log in with hamster
            </p>
        </div>
        <p class="or_text">
            Or
        </p>
        <form class="form_wrap">
            <input type="text" placeholder="아이디를 입력하세요">
            <input type="password" placeholder="비밀번호를 입력하세요">
            <button class="login-btn">
                로그인
            </button>
        </form>
        <p class="forgot">
            비밀번호를 잊어버리셨나요?
        </p>
    </div>
</body>
</html>
